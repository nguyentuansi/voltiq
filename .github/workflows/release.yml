name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build dashboard
        run: pnpm --filter @voltiq/dashboard build
      - name: Build release binary
        run: cargo build --release --manifest-path crates/Cargo.toml --target ${{ matrix.target }} -p voltiq-cli
      - name: Stage binary
        shell: bash
        run: |
          bin="voltiq"
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          src="crates/target/${{ matrix.target }}/release/${bin}${ext}"
          out="voltiq-${{ matrix.target }}${ext}"
          cp "$src" "$out"
      - uses: softprops/action-gh-release@v2
        with:
          files: voltiq-${{ matrix.target }}*
