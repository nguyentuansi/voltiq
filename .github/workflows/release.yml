name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release with binaries

jobs:
  # 1) Cross-platform binaries -> attached to the GitHub Release (for curl|sh / manual install).
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build dashboard (embedded into the binary)
        run: bun run --filter @voltiq/dashboard build
      - name: Build release binary
        run: cargo build --release --manifest-path crates/Cargo.toml --target ${{ matrix.target }} -p voltiq
      - name: Stage binary
        shell: bash
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          cp "crates/target/${{ matrix.target }}/release/voltiq${ext}" "voltiq-${{ matrix.target }}${ext}"
      - uses: softprops/action-gh-release@v2
        with:
          files: voltiq-${{ matrix.target }}*

  # 2) Publish the crates to crates.io in dependency order (so `cargo install voltiq` works).
  #    Auth via a scoped crates.io token stored as the CARGO_REGISTRY_TOKEN repo secret.
  #    Token-less alternative: configure crates.io Trusted Publishing per crate and swap the
  #    env for `- uses: rust-lang/crates-io-auth-action@v1` + `permissions: id-token: write`.
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build dashboard (voltiq-server embeds it at compile time)
        run: bun run --filter @voltiq/dashboard build
      - name: cargo publish (core first, cli last)
        working-directory: crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          for c in voltiq-core voltiq-security voltiq-perf voltiq-analysis voltiq-server voltiq-mcp voltiq; do
            echo "::group::publish $c"
            cargo publish -p "$c"
            echo "::endgroup::"
          done
