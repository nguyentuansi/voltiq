name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install JS deps
        run: bun install --frozen-lockfile
      - name: Build dashboard (needed before cargo embeds it)
        run: bun run --filter @voltiq/dashboard build
      - name: cargo fmt
        run: cargo fmt --all --check
        working-directory: crates
      - name: cargo clippy
        run: cargo clippy --manifest-path crates/Cargo.toml --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path crates/Cargo.toml
